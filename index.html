<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gamer Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }
        /* Шапка */
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #334155; }
        
        /* Контентные блоки */
        .page { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .active { display: block; }

        /* Карточки для поиска тимейтов */
        .teammate-card {
            background: var(--card-bg);
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
            border-left: 4px solid var(--accent-color);
        }
        .tag { font-size: 12px; background: #334155; padding: 4px 8px; border-radius: 4px; margin-right: 5px; }

        /* Нижнее меню */
        .nav {
            display: flex; justify-content: space-around;
            background: var(--card-bg); padding: 15px 0;
            border-top: 1px solid #334155;
        }
        .nav-item {
            text-align: center; color: var(--text-dim); cursor: pointer; font-size: 12px;
        }
        .nav-item.active-nav { color: var(--accent-color); font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        button {
            width: 100%; padding: 12px; background: var(--accent-color);
            border: none; border-radius: 8px; color: #000; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header" id="header-title">Поиск тимейтов</div>

    <div id="search" class="page active">
        <div class="teammate-card">
            <div style="font-weight: bold;">Gamer_PRO1337</div>
            <div style="color: var(--text-dim); margin: 5px 0;">Ищу пати в Brawl Stars. Ранг: 25+</div>
            <div><span class="tag">Brawl Stars</span><span class="tag">Discord</span></div>
            <button onclick="contact()">Написать</button>
        </div>
        <div class="teammate-card">
            <div style="font-weight: bold;">Shadow_Kill</div>
            <div style="color: var(--text-dim); margin: 5px 0;">Нужен саппорт в пати. Адекватность 100%</div>
            <div><span class="tag">Mobile Legends</span></div>
            <button onclick="contact()">Написать</button>
        </div>
    </div>

    <div id="tournaments" class="page">
        <div class="teammate-card" style="border-left-color: #f59e0b;">
            <div style="font-weight: bold;">Weekend Cup #12</div>
            <div style="color: var(--text-dim); margin: 5px 0;">Призовой фонд: 5000 гемов</div>
            <div style="font-size: 13px;">Начало: Завтра в 18:00</div>
            <button style="background: #f59e0b;" onclick="alert('Вы записаны!')">Участвовать</button>
        </div>
    </div>

    <div id="profile" class="page">
        <div style="text-align: center;">
            <div style="font-size: 50px;">👤</div>
            <h2 id="user-name">Загрузка...</h2>
            <p style="color: var(--text-dim);">ID: <span id="user-id">---</span></p>
            <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: left;">
                <div>Рейтинг: ⭐ 4.9</div>
                <div>Игр сыграно: 154</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="showPage('search', 'Поиск тимейтов', this)">
            <span class="nav-icon">🔍</span>Поиск
        </div>
        <div class="nav-item" onclick="showPage('tournaments', 'Турниры', this)">
            <span class="nav-icon">🏆</span>Турниры
        </div>
        <div class="nav-item" onclick="showPage('profile', 'Профиль', this)">
            <span class="nav-icon">👤</span>Профиль
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Отображение данных профиля
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;

        function showPage(pageId, title, navEl) {
            // Скрыть все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Показать нужную
            document.getElementById(pageId).classList.add('active');
            // Обновить заголовок
            document.getElementById('header-title').innerText = title;
            // Обновить стили меню
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            navEl.classList.add('active-nav');
            
            tg.HapticFeedback.selectionChanged();
        }

        function contact() {
            tg.showConfirm("Хотите отправить запрос этому игроку?");
        }
    </script>
</body>
</html>
