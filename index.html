<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brawl Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #fbc531;
            --text: #ffffff;
            --danger: #e84118;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        
        /* Ошибки и заглушки */
        #access-denied, #maintenance-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        /* Админ-панель */
        .admin-block { display: none; margin-top: 20px; padding: 15px; border: 2px dashed var(--accent); border-radius: 15px; background: rgba(251, 197, 49, 0.1); }
        .btn-admin { background: var(--danger); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        /* Стили из прошлого ответа */
        .header { background: #0f3460; padding: 15px; text-align: center; color: var(--accent); border-bottom: 2px solid var(--accent); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f3460; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--accent); }
        .nav-item { font-size: 12px; color: #aaa; text-align: center; }
        .nav-item.active-nav { color: var(--accent); }
        .profile-card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="access-denied">
    <h1>🛑 ОШИБКА</h1>
    <p>У вас нет доступа к этому сайту.<br>Зайдите через официального бота.</p>
</div>

<div id="maintenance-screen">
    <h1 style="color: var(--accent);">🛠 ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</h1>
    <p>Мы обновляем систему для лучшей игры!</p>
    <button onclick="location.reload()" style="padding: 10px 20px;">Перезагрузить</button>
    <button id="admin-stop-maint" style="display:none; margin-top:10px; background: var(--danger); color:white;" onclick="stopMaintenance()">Закончить (Админ)</button>
</div>

<div id="main-content">
    <div class="header" id="title">BRAWL TEAM</div>

    <div id="search_page" class="page active">
        <p>Тут список объявлений...</p>
    </div>

    <div id="tourneys_page" class="page">
        <p>Сетка турниров...</p>
    </div>

    <div id="profile_page" class="page">
        <div class="profile-card">
            <h2 id="user_name">Brawler</h2>
            <p id="user_id">ID: 0</p>
            
            <div id="admin-panel" class="admin-block">
                <h3 style="margin:0; color: var(--accent);">👑 АДМИН ПАНЕЛЬ</h3>
                <button class="btn-admin" onclick="startMaintenanceTimer()">Начать тех. перерыв</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="nav('search_page', 'ПОИСК', this)">🔍 Поиск</div>
        <div class="nav-item" onclick="nav('tourneys_page', 'ТУРНИРЫ', this)">🏆 Турниры</div>
        <div class="nav-item" onclick="nav('profile_page', 'ПРОФИЛЬ', this)">👤 Профиль</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8614629615; // ЗАМЕНИ НА СВОЙ ID (цифрами)

    // 1. ПРОВЕРКА НА ВХОД ЧЕРЕЗ TG
    if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('access-denied').style.display = 'flex';
    } else {
        tg.expand();
        const user = tg.initDataUnsafe.user;
        document.getElementById('user_name').innerText = user.first_name;
        document.getElementById('user_id').innerText = "ID: " + user.id;

        // 2. ПРОВЕРКА НА АДМИНА
        if (user.id === ADMIN_ID) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-stop-maint').style.display = 'block';
        }
    }

    function nav(page, title, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page).classList.add('active');
        document.getElementById('title').innerText = title;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
    }

    // 3. ТЕХНИЧЕСКИЙ ПЕРЕРЫВ
    function startMaintenanceTimer() {
        tg.showConfirm("Предупредить всех о тех. перерыве через 5 минут?");
        // Имитация уведомления (в реале нужен бэкенд)
        tg.showAlert("⚠️ ВНИМАНИЕ: Через 5 минут начнется технический перерыв!");
        
        // Через 5 секунд (для теста сделал быстро, замени на 300000 для 5 минут)
        setTimeout(() => {
            activateMaintenance();
        }, 5000); 
    }

    function activateMaintenance() {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('maintenance-screen').style.display = 'flex';
        tg.HapticFeedback.notificationOccurred('error');
    }

    function stopMaintenance() {
        document.getElementById('maintenance-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        tg.showAlert("Технический перерыв окончен!");
    }
</script>
</body>
</html>
