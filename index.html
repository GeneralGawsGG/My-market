<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phone Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основные стили, использующие переменные темы Telegram */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px; /* Место для кнопок внизу */
            -webkit-user-select: none; /* Запрет выделения текста */
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--tg-theme-hint-color, #777777);
        }

        /* Сетка товаров */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
        }

        .product-card:active {
            transform: scale(0.97); /* Эффект нажатия */
        }

        .product-image {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            /* Заглушка вместо картинки */
            background-color: #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin: 5px 0;
            height: 34px; /* Чтобы текст не прыгал */
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            color: var(--tg-theme-button-color, #2481cc);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .add-btn {
            width: 100%;
            padding: 8px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>📱 Наш Маркетплейс</h1>

    <div class="product-grid">
        <div class="product-card">
            <div class="product-image">📱</div>
            <div class="product-name">SuperPhone X</div>
            <div class="product-price">99 990 ₽</div>
            <button class="add-btn" onclick="addToCart('SuperPhone X', 99990)">В корзину</button>
        </div>

        <div class="product-card">
            <div class="product-image">🎧</div>
            <div class="product-name">AirBuds Pro</div>
            <div class="product-price">14 500 ₽</div>
            <button class="add-btn" onclick="addToCart('AirBuds Pro', 14500)">В корзину</button>
        </div>

        <div class="product-card">
            <div class="product-image">⌚️</div>
            <div class="product-name">SmartWatch S7</div>
            <div class="product-price">32 000 ₽</div>
            <button class="add-btn" onclick="addToCart('SmartWatch S7', 32000)">В корзину</button>
        </div>

        <div class="product-card">
            <div class="product-image">💻</div>
            <div class="product-name">PowerBook Pro</div>
            <div class="product-price">150 000 ₽</div>
            <button class="add-btn" onclick="addToCart('PowerBook Pro', 150000)">В корзину</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        // Настройка главной кнопки Telegram (внизу экрана)
        tg.MainButton.text = "Перейти к оплате";
        tg.MainButton.textColor = "#FFFFFF";
        tg.MainButton.color = "#2481cc";

        let cart = [];

        function addToCart(name, price) {
            cart.push({name, price});
            updateMainButton();
            // Легкая вибрация при добавлении
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateMainButton() {
            if (cart.length > 0) {
                let total = cart.reduce((sum, item) => sum + item.price, 0);
                tg.MainButton.text = `Оформить (${cart.length} тов. на ${total} ₽)`;
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // Обработка нажатия на главную кнопку
        tg.onEvent('mainButtonClicked', function(){
            tg.showAlert("Спасибо за заказ! (Это тестовый маркетплейс)");
            // Здесь должна быть логика отправки данных в бота, но пока просто закроем
            tg.close();
        });
    </script>
</body>
  </html>
